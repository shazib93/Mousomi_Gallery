<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অর্ডার - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark" style="background:#c2185b;">
    <div class="container">
        <span class="navbar-brand">🌸 অর্ডার তালিকা</span>
        <a href="/admin/products" class="btn btn-outline-light btn-sm">← Products</a>
    </div>
</nav>
<div class="container mt-4">
    <h5>মোট অর্ডার: {{ orders|length }}টি</h5>
    {% if orders %}
    <div class="table-responsive mt-3">
        <table class="table table-bordered table-hover table-sm">
            <thead class="table-dark">
                <tr>
                    <th>#</th><th>নাম</th><th>মোবাইল</th><th>ঠিকানা</th><th>পণ্য</th><th>নোট</th><th>তারিখ</th>
                </tr>
            </thead>
            <tbody>
                {% for o in orders %}
                <tr>
                    <td>{{ o.id }}</td>
                    <td>{{ o.naam }}</td>
                    <td><a href="tel:{{ o.mobile }}">{{ o.mobile }}</a></td>
                    <td>{{ o.thikana }}</td>
                    <td>{{ o.product }}</td>
                    <td>{{ o.note }}</td>
                    <td>{{ o.date }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
    <div class="text-center py-5 text-muted"><h5>এখনো কোনো অর্ডার নেই।</h5></div>
    {% endif %}
</div>
</body>
</html>
