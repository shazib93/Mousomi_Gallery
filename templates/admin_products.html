<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark" style="background:#c2185b;">
    <div class="container-fluid">
        <span class="navbar-brand">🌸 Mousumi Admin</span>
        <div>
            <a href="/admin/add" class="btn btn-light btn-sm me-2">+ পণ্য যোগ</a>
            <a href="/admin/orders" class="btn btn-outline-light btn-sm me-2">অর্ডার</a>
            <a href="/" class="btn btn-outline-light btn-sm me-2">Shop</a>
            <a href="/admin/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h5>সব পণ্য — মোট {{ products|length }}টি</h5>
    <div class="row g-3 mt-1">
        {% for p in products %}
        <div class="col-6 col-md-3">
            <div class="card">
                <img src="{{ p.image_url }}" style="height:150px; object-fit:cover;" onerror="this.src='https://placehold.co/300x150?text=No+Image'">
                <div class="card-body p-2">
                    <p class="fw-bold small mb-1">{{ p.naam }}</p>
                    <span class="badge bg-secondary mb-1">{{ p.category }}</span>
                    <p class="text-danger fw-bold mb-2">৳{{ p.price }}</p>
                    <a href="/admin/delete/{{ p.id }}" class="btn btn-danger btn-sm w-100" onclick="return confirm('মুছে দেবো?')">🗑️ মুছুন</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
