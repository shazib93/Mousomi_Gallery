<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Mousumi's Gallery</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #fcf8f5; }
    .login-card { background: #fff; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); padding: 40px; max-width: 400px; margin: 80px auto; }
    .login-card h4 { color: #d43f5a; font-weight: 700; }
    .login-card .btn-login { background: #d43f5a; color: #fff; border-radius: 50px; padding: 12px; font-weight: 600; width: 100%; border: none; transition: 0.2s; }
    .login-card .btn-login:hover { background: #b02c44; }
  </style>
</head>
<body>
<div class="container">
  <div class="login-card">
    <h4 class="text-center mb-4">🌸 Mousumi's Gallery</h4>
    <h5 class="text-center mb-3" style="color:#2d2a24;">Admin Login</h5>
    {% if error %}<div class="alert alert-danger text-center">Username বা Password ভুল!</div>{% endif %}
    <form method="POST" action="/admin">
      <div class="mb-3">
        <label class="form-label fw-bold">Username</label>
        <input type="text" class="form-control" name="username" required style="border-radius: 30px; padding: 12px 20px;">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Password</label>
        <input type="password" class="form-control" name="password" required style="border-radius: 30px; padding: 12px 20px;">
      </div>
      <button type="submit" class="btn-login">🔐 লগইন করুন</button>
    </form>
    <p class="text-center mt-3 text-muted small">Mousumi's Gallery Admin Panel</p>
  </div>
</div>
</body>
</html>
