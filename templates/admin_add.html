<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পণ্য যোগ করুন</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark" style="background:#c2185b;">
    <div class="container">
        <span class="navbar-brand">🌸 পণ্য যোগ করুন</span>
        <a href="/admin/products" class="btn btn-outline-light btn-sm">← ফিরে যান</a>
    </div>
</nav>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <form method="POST" action="/admin/add">
                        <div class="mb-3">
                            <label class="form-label fw-bold">পণ্যের নাম *</label>
                            <input type="text" class="form-control" name="naam" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">ক্যাটাগরি *</label>
                            <select class="form-select" name="category" required>
                                <option value="">বেছে নিন</option>
                                {% for cat in categories %}
                                <option value="{{ cat }}">{{ cat }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">দাম (৳) *</label>
                            <input type="number" class="form-control" name="price" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">ছবির লিংক *</label>
                            <input type="url" class="form-control" name="image_url" id="imgUrl" placeholder="https://..." required>
                            <small class="text-muted">imgbb.com এ ছবি upload করে Direct Link কপি করো</small>
                        </div>
                        <div id="preview" class="mb-3 text-center" style="display:none;">
                            <img id="preview-img" src="" style="max-height:200px; border-radius:10px; border:1px solid #ddd;">
                        </div>
                        <button type="submit" class="btn w-100 py-2" style="background:#c2185b; color:white; border-radius:50px;">✅ পণ্য যোগ করুন</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
document.getElementById("imgUrl").addEventListener("input", function() {
    const url = this.value;
    if (url) {
        document.getElementById("preview").style.display = "block";
        document.getElementById("preview-img").src = url;
    }
});
</script>
</body>
</html>
