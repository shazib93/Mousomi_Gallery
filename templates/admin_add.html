<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>পণ্য যোগ – Mousumi's Gallery</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #fcf8f5; }
    .admin-nav { background: #d43f5a; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .admin-nav span { color: #fff; font-size: 1.3rem; font-weight: 700; }
    .admin-nav a { color: #fff; text-decoration: none; padding: 6px 16px; border-radius: 30px; transition: 0.2s; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.4); }
    .admin-nav a:hover { background: #fff; color: #d43f5a; }
    .form-card { background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); padding: 30px; max-width: 600px; margin: 30px auto; }
    .form-card .btn-submit { background: #d43f5a; color: #fff; border-radius: 50px; padding: 12px; font-weight: 600; width: 100%; border: none; transition: 0.2s; }
    .form-card .btn-submit:hover { background: #b02c44; }
  </style>
</head>
<body>
<nav class="admin-nav">
  <span>🌸 Mousumi's Gallery</span>
  <a href="/admin/products">← ফিরে যান</a>
</nav>
<div class="container">
  <div class="form-card">
    <h4 class="text-center mb-4" style="color:#d43f5a;">➕ নতুন পণ্য যোগ</h4>
    <form method="POST" action="/admin/add">
      <div class="mb-3">
        <label class="form-label fw-bold">পণ্যের নাম *</label>
        <input type="text" class="form-control" name="naam" required style="border-radius: 30px; padding: 12px 20px;">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">ক্যাটাগরি *</label>
        <select class="form-select" name="category" required style="border-radius: 30px; padding: 12px 20px;">
          <option value="">বেছে নিন</option>
          {% for cat in categories %}
          <option value="{{ cat }}">{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">দাম (৳) *</label>
        <input type="number" class="form-control" name="price" required style="border-radius: 30px; padding: 12px 20px;">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">স্টোক (পিস) *</label>
        <input type="number" class="form-control" name="stock" value="10" required style="border-radius: 30px; padding: 12px 20px;">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">ডিসকাউন্ট (%)</label>
        <input type="number" class="form-control" name="discount" value="0" style="border-radius: 30px; padding: 12px 20px;">
        <small class="text-muted">যেমন—২০ দিলে ২০% ছাড় দেখাবে</small>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">ছবির লিংক *</label>
        <input type="url" class="form-control" name="image_url" id="imgUrl" placeholder="https://..." required style="border-radius: 30px; padding: 12px 20px;">
        <small class="text-muted">imgbb.com-এ ছবি upload করে Direct Link কপি করো</small>
      </div>
      <div id="preview" class="mb-3 text-center" style="display:none;">
        <img id="preview-img" src="" style="max-height:180px; border-radius:12px; border:1px solid #ddd;">
      </div>
      <button type="submit" class="btn-submit">✅ পণ্য যোগ করুন</button>
    </form>
  </div>
</div>
<script>
document.getElementById("imgUrl").addEventListener("input", function() {
  const url = this.value;
  if (url) {
    document.getElementById("preview").style.display = "block";
    document.getElementById("preview-img").src = url;
  }
});
</script>
</body>
</html>
